<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" href="../img/logo.png" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Usuario</title>
  <!--  Bootstrap -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: georgia;
      font-style: italic;
    }
    body{
      background: url(/login/background.jg);
      background-position: center center;
      background-size: cover;
      
    }
    /* Estilo para la imagen del perfil redonda */
    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* Estilo para el contenedor del perfil */
    .profile-container {
      margin-top: 50px;
    }

    /* Contenedor del iframe */
    .iframe-container {
      width: 100%;
      height: 100vh; 
      overflow: hidden; 
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
    }

    iframe {
      width: 800px;
      height: 800px; 
      border: 0; 
      overflow: hidden; 
    }

    body {
      overflow-x: hidden;
    }
  </style>
</head>
<body>

  <div class="container profile-container">
    <div class="row">
      <!-- Columna de la imagen de perfil y nombre -->
      <div class="col-12 col-md-4 text-center">
        <img src="../img/foto_perfil.jpg" alt="Imagen de Perfil" class="profile-img">
        <h3>Juan Pérez</h3>
        <p>mecanico</p>
      </div>
      
      <!--  enlaces y contenido -->
      <div class="col-12 col-md-8">
        <div class="list-group">
          <!-- Enlaces  para cada sección -->
          <a href="../html/descripcion_general.html" class="list-group-item list-group-item-action" target="contenido">Descripción General</a>
          <a href="../html/editar_perfil.html" class="list-group-item list-group-item-action" target="contenido">Editar Perfil</a>
          <a href="https://www.example.com/settings" class="list-group-item list-group-item-action" target="contenido">Ajustes</a>
          <a href="https://www.example.com/change-password" class="list-group-item list-group-item-action" target="contenido">Cambiar Contraseña</a>
        </div>

        <!--  detalles -->
        <div class="mt-4 iframe-container">
          <!-- Aquí se cargará el contenido  -->
          <iframe name="contenido" src="../html/descripcion_general.html" frameborder="0"></iframe>
        </div>
      </div>
    </div>
  </div>

  <!--  Bootstrap -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  
</body>
</html>
