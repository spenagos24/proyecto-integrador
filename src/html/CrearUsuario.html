<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="../img/logo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="">
    <style>
      *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
    color:#fff;
  }
  body{
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    padding: 10px;
    background: url(/src/img/background.jpg);
    background-size: cover;
    background-position: center;
  }
  .container{
    max-width: 700px;
    width: 100%;
    padding: 25px 30px;
    border-radius: 15px;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid  #0077b6;
  }
  select{
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    outline: none;
    border: 2px solid #0077b6;
    background: transparent;
    color: #fff;
  }
  select:hover ,select:focus{
background: transparent;
border-color: aqua;

  }
  select option{
    padding: 10px;
    color: #fff;
    background-color: #0077b6
  }
  select option[select]{
    background: #0077b6;
  }
  .container .tittle{
    font-size: 25px;
    font-weight: 500;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container form .user-details{
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    margin: 20px 0 12px 0;  
  }
  form .user-details .input-box{
    margin-bottom: 15px;
    width: calc(100% / 2 - 20px);
  }
  .user-details .input-box .details{
    display: block;
    font-weight: 500;
    margin-bottom: 5px;
  }
  .user-details .input-box input{
    height: 45px;
    width: 100%;
    outline: none;
    border-radius: 10px;
    border: 2px solid #0077b6;
    padding-left: 15px;
    font-size: 16px;
    border-bottom-width: 2px;
    transition: all 0.3s ease;
    background: transparent;
    color: white;
  }
  .user-details .input-box input:focus,
  .user-details .input-box input:valid{
    border-color: aqua;
  }
  form .button{
    height: 45px;
    margin: 45px;
  }
  form .button button{
    height: 100%;
    width: 100%;
     position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 5px;
    background: #03045e;
    font-family: "Montserrat", sans-serif;
    box-shadow: 0px 6px 24px 0px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    cursor: pointer;
    border: none;
    border: 2px solid #0077b6;
    
  }
  input::placeholder{
    color: #fff;
    font-style: italic;
    font-family: georgia;
  }
  button:after {
    content: " ";
    width: 0%;
    height: 100%;
    background: #0077b6;
    position: absolute;
    transition: all 0.4s ease-in-out;
    right: 0;
    }
    button:hover::after {
    right: auto;
    left: 0;
    width: 100%;

    }
    button span {
    text-align: center;
    text-decoration: none;
    width: 100%;
    padding: 18px 25px;
    color: #fff;
    font-size: 1.125em;
    font-weight: 700;
    letter-spacing: 0.3em;
    z-index: 20;
    transition: all 0.3s ease-in-out;
    }
    button:hover span {
    color: #03045e;
    animation: scaleUp 0.3s ease-in-out;
  }
  
  @media (max-width: 584px) {
      .container{
          max-width: 100%;
   } 
   form .user-details .input-box{
      margin-bottom: 15px;
      width: 100%;
  }
  form .gender-details .category{
      width: 100%;
  }
  .container form .user-details{
      max-height: 300px;
      overflow-y: scroll;
  }
  .user-details::-webkit-scrollbar{
      width: 0;
  }
  }
    </style>
</head>
<body>
    <div class="container">
        <div class="tittle">Crear Usuario</div>
        <form action="#">
          <div class="user-details">
        <div class="input-box">
          <span class="details">Nombre Completo</span>
          <input type="text" placeholder="Ingresa tu nombre" required>
        </div>
        <div class="input-box">
          <span class="details">Usuario</span>
          <input type="text" placeholder="Ingresa tu Usuario" required>
        </div>
        <div class="input-box">
          <span class="details">E-mail</span>
          <input type="text" placeholder="Ingresa tu Correo" required>
        </div>
        <div class="input-box">
          <span class="details">Telefono</span>
          <input type="text" placeholder="Ingresa numero de telefono" required>
        </div>
        <div class="input-box">
          <span class="details">Contraseña</span>
          <input type="password" placeholder="Ingresa tu contraseña" required>
        </div>
        <div class="input-box">
          <span class="details">confirmar Contraseña</span>
          <input type="password" placeholder="Confirmar Contraseña" required>
        </div>
        <div class="input-box">
          <span>
               area de trabajo
          </span>
          <select name="" id="">
        <option value="">Accesor</option>
        <option value="">Administración</option>
        <option value="">operario</option>
        <option value="">control calidad</option>
          </select></div>
        </div>
         <div class="button">
         <button>
          <span>REGISTRARME</span>
          </button>
         </div>
        </form>
      </div>
</body>
</html>
